name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic/claude-code

      - name: Authenticate Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            claude auth add --api-key "$ANTHROPIC_API_KEY"
          fi

      - name: Setup test skills
        run: |
          mkdir -p ~/.claude/skills/weather-checker
          printf '%s\n' '# weather-checker' '' '## Steps' '' 'Step 1: Use the Bash tool to check weather:' 'Tool: Bash' 'Input: {"command": "echo '"'"'Weather check: '"'"' && date"}' > ~/.claude/skills/weather-checker/SKILL.md

      - name: Run tests
        run: npm test
