name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install || cat ~/.npm/_logs/*.log 2>/dev/null || echo "no npm logs"
      - name: Build TypeScript
        run: |
          echo "=== tsc version ==="
          npx tsc --version
          echo "=== building ==="
          npx tsc
          echo "=== dist contents ==="
          ls -la dist/

      - name: Show version from package.json
        run: echo "Publishing version $(node -p \"require('./package.json').version\")"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
