name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Set Claude Code environment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          mkdir -p ~/.claude
          printf '{"env":{"ANTHROPIC_API_KEY":"%s","ANTHROPIC_BASE_URL":"%s","ANTHROPIC_MODEL":"%s"}}\n' \
            "$ANTHROPIC_API_KEY" \
            "$ANTHROPIC_BASE_URL" \
            "$ANTHROPIC_MODEL" > ~/.claude/settings.json

      - name: Setup test skills
        env:
          HOME: /home/runner
        run: bash scripts/setup-test-skills.sh

      - name: Start relay and run tests
        run: |
          node dist/index.js start &
          RELAY_PID=$!

          for i in {1..10}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Relay ready"
              break
            fi
            sleep 1
          done

          node dist/index.js init --url http://localhost:8080
          npm test
          TEST_RESULT=$?

          kill $RELAY_PID 2>/dev/null || true
          exit $TEST_RESULT

  publish:
    runs-on: ubuntu-latest
    needs: test
    # Only run on tag pushes (not on regular commits)
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install --ignore-scripts

      - name: Build
        run: npx tsc

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Published version: $PKG_VERSION"
