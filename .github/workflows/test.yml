name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            claude auth add --api-key "$ANTHROPIC_API_KEY"
          fi

      - name: Setup test skills
        env:
          HOME: /home/runner
        run: |
          bash scripts/setup-test-skills.sh
          echo "Skills installed:"
          ls -la /home/runner/.claude/skills/

      - name: Verify skills exist
        run: |
          echo "Verifying skills..."
          ls -la /home/runner/.claude/skills/

      - name: Run tests
        run: |
          export PATH="$PATH:$(npm root -g)"
          npm test
