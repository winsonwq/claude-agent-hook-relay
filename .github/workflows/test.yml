name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Set Claude Code environment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          # Create settings.json with env vars for Claude Code
          mkdir -p ~/.claude
          printf '{"env":{"ANTHROPIC_API_KEY":"%s","ANTHROPIC_BASE_URL":"%s","ANTHROPIC_MODEL":"%s"}}\n' \
            "$ANTHROPIC_API_KEY" \
            "$ANTHROPIC_BASE_URL" \
            "$ANTHROPIC_MODEL" > ~/.claude/settings.json
          echo "Claude Code settings configured"
          cat ~/.claude/settings.json

      - name: Setup test skills
        env:
          HOME: /home/runner
        run: bash scripts/setup-test-skills.sh

      - name: Start relay and init hooks
        run: |
          # Start relay in background
          node dist/index.js start &
          RELAY_PID=$!
          echo "Relay PID: $RELAY_PID"
          
          # Wait for relay
          for i in {1..10}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Relay ready"
              break
            fi
            sleep 1
          done
          
          # Configure Claude Code hooks to point to relay
          node dist/index.js init --url http://localhost:8080
          
          # Run tests
          npm test
          TEST_RESULT=$?
          
          # Cleanup
          kill $RELAY_PID 2>/dev/null || true
          
          exit $TEST_RESULT
