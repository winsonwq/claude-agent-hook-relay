name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            claude auth add --api-key "$ANTHROPIC_API_KEY"
          fi

      - name: Setup test skills
        run: |
          mkdir -p ~/.claude/skills/weather-checker
          printf '%s\n' '# weather-checker' '' '## Steps' '' 'Step 1: Use the Bash tool to check weather:' 'Tool: Bash' 'Input: {"command": "echo 'Weather check: ' && date"}' > ~/.claude/skills/weather-checker/SKILL.md

      - name: Run tests
        run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install --ignore-scripts

      - name: Build
        run: npx tsc

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Published version: $PKG_VERSION"
          npm install -g claude-agent-hook-relay
          claude-agent-hook-relay --version
          claude-agent-hook-relay --help > /dev/null
          echo "Verification passed!"
