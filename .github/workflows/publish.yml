name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install || cat ~/.npm/_logs/*.log 2>/dev/null || echo "no npm logs"
      - name: Build TypeScript
        run: |
          echo "=== node version ==="
          node --version
          echo "=== tsc version ==="
          ./node_modules/.bin/tsc --version || npx tsc --version
          echo "=== ls node_modules/.bin ==="
          ls node_modules/.bin/ 2>/dev/null | head -20
          echo "=== building ==="
          ./node_modules/.bin/tsc 2>&1
          echo "=== exit code ==="
          echo $?

      - name: Show version from package.json
        run: echo "Publishing version $(node -p \"require('./package.json').version\")"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
