name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -g claude-agent-hook-relay

      - name: Authenticate Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            claude auth add --api-key "$ANTHROPIC_API_KEY"
          fi

      - name: Setup test skills
        env:
          HOME: /home/runner
        run: bash scripts/setup-test-skills.sh

      - name: Configure relay hooks
        run: |
          # Find npm global bin path - it's one level up from npm root -g
          NPM_ROOT=$(npm root -g)
          NPM_BIN="${NPM_ROOT%/lib/node_modules}/bin"
          echo "NPM root: $NPM_ROOT"
          echo "NPM bin: $NPM_BIN"
          ls -la "$NPM_BIN/" 2>/dev/null | head -20 || echo "Cannot list bin"
          
          # Check if cahr is there
          if [ -x "$NPM_BIN/cahr" ]; then
            CAHR_PATH="$NPM_BIN/cahr"
            echo "Found cahr at: $CAHR_PATH"
          else
            echo "cahr not found at $NPM_BIN/cahr"
            find /opt/hostedtoolcache -name "cahr" -type f 2>/dev/null | head -5
          fi
          
          # Start relay in background
          node dist/index.js start &
          RELAY_PID=$!
          echo "Relay PID: $RELAY_PID"
          
          # Wait for relay
          for i in {1..10}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Relay ready"
              break
            fi
            sleep 1
          done
          
          # Configure hooks if cahr found
          if [ -n "$CAHR_PATH" ] && [ -x "$CAHR_PATH" ]; then
            $CAHR_PATH init --url http://localhost:8080 || echo "cahr init failed"
          else
            echo "Skipping cahr init - not found"
          fi
          
          # Verify settings
          echo "Settings after init:"
          cat ~/.claude/settings.json 2>/dev/null | head -c 500 || echo "no settings"
          
          # Run tests
          npm test
          TEST_RESULT=$?
          
          # Cleanup
          kill $RELAY_PID 2>/dev/null || true
          
          exit $TEST_RESULT
