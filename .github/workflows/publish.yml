name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install 2>&1

      - name: Build TypeScript
        continue-on-error: true
        run: |
          echo "=== node version ==="
          node --version
          echo "=== tsc version ==="
          ./node_modules/.bin/tsc --version 2>&1 || echo "tsc not found in .bin"
          echo "=== ls node_modules/.bin ==="
          ls -la node_modules/.bin/ 2>/dev/null | head -20 || echo "no .bin"
          echo "=== building ==="
          ./node_modules/.bin/tsc 2>&1
          EXIT=$?
          echo "=== exit code: $EXIT ==="
          exit $EXIT

      - name: Show version from package.json
        run: echo "Publishing version $(node -p \"require('./package.json').version\")"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
